# Core App Info
spring.application.name=film-rental-store

# Database connection details matching the GitHub Actions MySQL service container
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=testuser
spring.datasource.password=testpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings for testing
# We use 'create-drop' instead of 'update' for tests to ensure a completely clean slate every time
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Use a random port for testing to avoid conflicts if the runner has 8080 occupied
server.port=0